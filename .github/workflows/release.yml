name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without leading v). Used for archive naming."
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            archive: linux-x64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
            archive: linux-arm64
          - target: aarch64-apple-darwin
            runner: macos-14
            archive: macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: build console bundle
        run: |
          cd console
          npm ci
          npm run build

      - name: cargo build
        env:
          MARG_RELEASE_TARGET: ${{ matrix.target }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: stage archive
        id: stage
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          STAGE="marg-${VERSION}-${{ matrix.archive }}"
          mkdir -p "$STAGE"
          cp target/${{ matrix.target }}/release/marg "$STAGE/"
          cp LICENSE README.md CHANGELOG.md SECURITY.md "$STAGE/"
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"
          echo "archive=${STAGE}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "sha=${STAGE}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ steps.stage.outputs.archive }}
            ${{ steps.stage.outputs.sha }}

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: download artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: aggregate checksums
        run: |
          mkdir -p release
          find dist -type f \( -name "*.tar.gz" -o -name "*.sha256" \) -exec cp {} release/ \;
          cd release
          cat *.sha256 > SHA256SUMS
          rm *.sha256

      - name: stage installer script
        run: |
          cp installer/install.sh release/install.sh
          chmod +x release/install.sh

      - name: github release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  container:
    name: publish container
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')

    env:
      # Docker Hub namespace. Override per-fork by setting a repo variable
      # named DOCKERHUB_NAMESPACE in GitHub UI. Default matches the public
      # SarthiAI org on Docker Hub.
      DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || 'sarthiai' }}

    steps:
      - uses: actions/checkout@v4

      - name: log in to docker hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: download linux-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: linux-x64
          path: ctx-x64

      - name: download linux-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: linux-arm64
          path: ctx-arm64

      - name: stage binaries
        run: |
          mkdir -p docker/bin
          tar -xzf ctx-x64/marg-*-linux-x64.tar.gz   -C docker/bin --strip-components=1
          mv docker/bin/marg docker/bin/marg-amd64
          tar -xzf ctx-arm64/marg-*-linux-arm64.tar.gz -C docker/bin --strip-components=1
          mv docker/bin/marg docker/bin/marg-arm64
          chmod +x docker/bin/marg-amd64 docker/bin/marg-arm64
          ls -la docker/bin

      - name: resolve docker tag
        id: tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: set up qemu
        uses: docker/setup-qemu-action@v3

      - name: set up buildx
        uses: docker/setup-buildx-action@v3

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/marg:${{ steps.tag.outputs.tag }}
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/marg:latest

      - name: smoke pushed image (boots + /health=200)
        run: |
          set -e
          docker run -d --name marg-smoke -p 8080:8080 -p 8081:8081 \
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/marg:${{ steps.tag.outputs.tag }}
          deadline=$((SECONDS + 30))
          status=""
          while [ "$SECONDS" -lt "$deadline" ]; do
            status=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/health || true)
            if [ "$status" = "200" ]; then
              break
            fi
            sleep 1
          done
          if [ "$status" != "200" ]; then
            echo "ERROR: /health never returned 200 (last=$status). Container logs:" >&2
            docker logs marg-smoke >&2 || true
            docker stop marg-smoke >/dev/null 2>&1 || true
            docker rm marg-smoke >/dev/null 2>&1 || true
            exit 1
          fi
          docker stop marg-smoke >/dev/null
          docker rm marg-smoke >/dev/null
          echo "OK: image came up + /health=200"
