name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without leading v). Used for archive naming."
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            archive: linux-x64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04
            archive: linux-arm64
            cross: true
          - target: aarch64-apple-darwin
            runner: macos-14
            archive: macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross --rev 4090beca3cfffa44371a5bba524de3a578aa46c3

      - name: build console bundle
        run: |
          cd console
          npm ci
          npm run build

      - name: cargo build
        env:
          MARG_RELEASE_TARGET: ${{ matrix.target }}
        run: |
          if [[ "${{ matrix.cross }}" == "true" ]]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: stage archive
        id: stage
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          STAGE="marg-${VERSION}-${{ matrix.archive }}"
          mkdir -p "$STAGE"
          cp target/${{ matrix.target }}/release/marg "$STAGE/"
          cp LICENSE README.md CHANGELOG.md SECURITY.md "$STAGE/"
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"
          echo "archive=${STAGE}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "sha=${STAGE}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ steps.stage.outputs.archive }}
            ${{ steps.stage.outputs.sha }}

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: download artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: aggregate checksums
        run: |
          mkdir -p release
          find dist -type f \( -name "*.tar.gz" -o -name "*.sha256" \) -exec cp {} release/ \;
          cd release
          cat *.sha256 > SHA256SUMS
          rm *.sha256

      - name: github release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  container:
    name: publish container
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: download linux-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: linux-x64
          path: ctx-x64

      - name: download linux-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: linux-arm64
          path: ctx-arm64

      - name: extract binaries
        run: |
          mkdir -p ctx
          tar -xzf ctx-x64/marg-*-linux-x64.tar.gz   -C ctx --strip-components=1
          mv ctx/marg ctx/marg.amd64
          tar -xzf ctx-arm64/marg-*-linux-arm64.tar.gz -C ctx --strip-components=1
          mv ctx/marg ctx/marg.arm64

      - name: build dockerfile
        run: |
          cat > ctx/Dockerfile <<'EOF'
          FROM scratch
          ARG TARGETARCH
          COPY marg.${TARGETARCH} /marg
          EXPOSE 8080 8081
          ENTRYPOINT ["/marg", "start", "--config", "/etc/marg/marg.toml"]
          EOF

      - name: set up qemu
        uses: docker/setup-qemu-action@v3

      - name: set up buildx
        uses: docker/setup-buildx-action@v3

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: ctx
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
