# Drop this file at /etc/security/limits.d/marg.conf when running Marg as a
# user-supervised process (tmux, supervisord, screen). When running under
# systemd the LimitNOFILE = 1048576 directive in marg.service is the
# authoritative setting and this file is not consulted.
#
# Requires a fresh login session for the limits to take effect.

marg soft nofile 1048576
marg hard nofile 1048576
